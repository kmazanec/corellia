# ──────────────────────────────────────────────────────────────────────────────
# Corellia — published-image deploy stack (no source checkout required).
#
# This is a STANDALONE compose file, not an overlay. A remote host with only a
# populated .env and this file runs the factory straight from GHCR:
#
#   CORELLIA_IMAGE=ghcr.io/<owner>/corellia:<tag> \
#     docker compose -f compose.deploy.yaml up -d
#
# It mirrors compose.yaml exactly EXCEPT the daemon has `image:` instead of
# `build:` — the host pulls a known-good artifact rather than building from
# source it does not have. A standalone file (rather than a merge overlay on
# compose.yaml) is deliberate: compose merges `build:` and `image:` additively,
# so an overlay cannot REMOVE the base `build:` block — a source-less host would
# still try to build. See ADR-045.
#
# SECRETS (ADR-012): every secret arrives via env_file ONLY. Copy .env.example
# to .env on the host and populate it before `up`. CORELLIA_IMAGE is set in the
# same .env (or exported) and pins the exact GHCR tag deployed.
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - corellia-pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER:-postgres}"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  daemon:
    # The published GHCR image, pinned by tag. No `build:` — this host has no
    # source. CORELLIA_IMAGE must be set (compose errors on an empty image ref).
    image: ${CORELLIA_IMAGE:?set CORELLIA_IMAGE to a pinned ghcr.io/<owner>/corellia:<tag>}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${HOST_PORT:-8080}:8080'
    volumes:
      # On a remote host TARGET_REPO_PATH is a clone-on-host path (see docs/deploy.md).
      - '${TARGET_REPO_PATH:-./}:/workspace'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - >
          const t=process.env.FRONT_DOOR_TOKEN;
          const p=process.env.FRONT_DOOR_PORT||8080;
          fetch(`http://127.0.0.1:$${p}/status`,{headers:{authorization:`Bearer $${t}`}})
            .then(r=>process.exit(r.status===200?0:1))
            .catch(()=>process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  corellia-pgdata:
