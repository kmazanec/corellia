# Dev-only Postgres helper. Invoke EXPLICITLY with -f to avoid being shadowed
# by compose.yaml (Docker Compose v2 prefers compose.yaml when both files exist):
#
#   docker compose -f docker-compose.yml up -d postgres
#
# Connect: DATABASE_URL=postgres://postgres:corellia@localhost:54329/postgres

services:
  postgres:
    image: postgres:18
    ports:
      - "54329:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corellia}
    volumes:
      - corellia-postgres:/var/lib/postgresql/data

volumes:
  corellia-postgres:
