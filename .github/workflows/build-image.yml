name: build-image

# CI + delivery for the Corellia daemon image.
#
#   test       — npm ci && npm test on every push and PR (this is the repo's CI).
#   build-push — builds the Dockerfile `runtime` target and pushes it to GHCR,
#                but only on push to main and on version tags. PRs build-only
#                (no push) so forks and untrusted PRs never touch the registry.
#
# Image: ghcr.io/<owner>/corellia
# Tags:  latest (main only) · sha-<short> (every push) · semver (on v* tags)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

# Least privilege at the top; the build-push job widens to packages:write.
permissions:
  contents: read

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test (lint + typecheck + vitest)
        run: npm test

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate to the registry when we intend to push (not on PRs).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/corellia
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          # Push only off main and tags; PRs build to validate but never publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
